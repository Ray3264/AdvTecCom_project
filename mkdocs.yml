site_name: My MkDocs Site
site_description: A modern documentation website built with MkDocs
site_author: Bulat Shigapov

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - toc.integrate
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.annotate
  palette:
    primary: indigo
    accent: deep orange

extra_css:
  - stylesheets/extra.css

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - tables

nav:
  - Home: index.md
  - Concept:
      - Overview: concept/overview.md
  - Gameplay:
      - Mechanics: gameplay/mechanics.md
  - World:
      - Levels: world/levels.md
  - Technical:
      - Engine: technical/engine.md
  - About: about.md