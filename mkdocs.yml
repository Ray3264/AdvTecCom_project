site_name: My MkDocs Site
site_description: A modern documentation website built with MkDocs
site_author: Bulat Shigapov

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - toc.integrate
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.annotate
  palette:
    primary: indigo
    accent: deep orange

extra_css:
  - stylesheets/extra.css

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - tables

nav:
  - Home: index.md
  - Concept:
      - Overview: concept/overview.md
  - Gameplay:
      - Mechanics: 
        - Engine Mode: gameplay/engineMode.md
        - Dialogue System: gameplay/dialogueSystem.md
        - Walking System: gameplay/walkingSystem.md
  - World:
      - Characters: world/characters.md
      - Levels: world/levels.md
  - Development:
      - Architecture: development/architecture.md
      - Scripting: development/scripting.md
      - Tools: development/tools.md
      - Art: development/art.md
  - Support: 
      - FAQ: support/faq.md
      - Contact: support/contact.md